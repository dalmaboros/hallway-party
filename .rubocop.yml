# Overwrite or add rules to create your own house style
#
# # Use `[a, [b, c]]` not `[ a, [ b, c ] ]`
# Layout/SpaceInsideArrayLiteralBrackets:
#   Enabled: false

inherit_gem:
  rubocop-shopify: rubocop.yml

plugins:
  - rubocop-rails
  - rubocop-rspec
  - rubocop-rspec_rails
  - rubocop-factory_bot

AllCops:
  NewCops: enable
  TargetRubyVersion: 4.0
  Exclude:
    - 'bin/**/*'
    - 'db/schema.rb'
    - 'db/schema_reference.rb'
    - 'db/structure.sql'
    - 'db/migrate/*.rb'
    - 'vendor/**/*'
    - 'node_modules/**/*'
    - 'tmp/**/*'
    - 'log/**/*'

# Let parens be a per-call judgment call, not a style rule
Style/MethodCallWithArgsParentheses:
  Enabled: false

Rails/I18nLocaleTexts:
  Enabled: false

Rails/Output:
  Exclude:
    - 'db/seeds.rb'
    - 'db/seeds/**/*.rb'
    - 'lib/tasks/**/*.rake'
