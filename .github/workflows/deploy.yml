name: Deploy

# Triggers when the CI workflow completes successfully on main, OR manually
# from the Actions tab. Only runs on main (filtered via the if: condition).
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    # Only deploy when CI passes on main, or when manually dispatched.
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-24.04-arm  # native arm64, no QEMU emulation needed
    timeout-minutes: 20

    # Scope this job to the `production` environment so its secrets and
    # variables are only accessible here, and respect any branch protections
    # set on the environment in repo settings.
    environment: production

    # Prevent concurrent deploys from clobbering each other
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # Kamal builds the image from a fresh git clone of HEAD,
          # so it needs full git history.
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up SSH key for VPS access
        # Host keys are pinned (not fetched via ssh-keyscan) so a transient
        # network blip during keyscan can't break deploys, and to close the
        # TOFU window. If the VPS is ever rebuilt, update these three lines.
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KAMAL_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/known_hosts <<'EOF'
          128.140.110.125 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIANrlMfpilYeTIdwUIvke8lOTbFaPRiADWxs1XcisJR9
          128.140.110.125 ssh-rsa 
          128.140.110.125 ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBLYhUiYxLMIU3jW2vwcewseGBOL2ReiXB8+YOGIPC4wTdihisiN6M2orhRyqZJuyxPWeeElgwEdxR0BYiPpNTFA=
          EOF

      - name: Restore Rails master key
        # .kamal/secrets reads RAILS_MASTER_KEY via `cat config/master.key`,
        # so we materialize the file from the GitHub secret.
        run: echo "${{ secrets.RAILS_MASTER_KEY }}" > config/master.key

      - name: Compute deploy metadata
        # Exposed to the kamal step (and on through to /version) via the env
        # block below. Computed here because env: blocks don't run a shell.
        run: echo "BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: dalmaboros
          password: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}

      - name: Deploy with Kamal
        # .kamal/secrets reads these vars from the shell environment, which
        # is exactly how local dev sources .kamal/.env. Here we inject them
        # directly via the production environment's secrets/variables.
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ vars.DB_PORT }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          GITHUB_CLIENT_ID: ${{ vars.OAUTH_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Deploy metadata exposed at /version. Kamal injects these into the
          # running container as runtime ENV (no Docker rebuild needed).
          # BUILD_TIME comes from the "Compute deploy metadata" step above.
          GIT_SHA: ${{ github.sha }}
        run: bin/kamal deploy
