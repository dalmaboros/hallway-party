name: Claude PR Review

on:
  pull_request:

    types: [opened, synchronize, reopened, ready_for_review, labeled]
    paths-ignore:
      - 'Gemfile.lock'
      - 'db/structure.sql'
      - 'db/schema_reference.rb'
      - 'db/*_schema.rb'
      - '**/*.svg'

# Cancel an in-flight review if a new push lands
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CLAUDE_MODEL: claude-sonnet-4-6

jobs:
  review:
    # Opt-in: apply the `claude-review` label to trigger an automated review.
    # Skip drafts and bot authors regardless.
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.type != 'Bot' &&
      contains(github.event.pull_request.labels.*.name, 'claude-review')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      id-token: write   # required by anthropics/claude-code-action for OIDC auth
    steps:
      - uses: actions/checkout@v6
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Read the file .claude/agents/code-reviewer.md. It contains a role,
            voice, checklist, and output format for evaluating pull requests.
            Apply that checklist to this PR's diff.

            Post your findings as a single top-level PR comment using
            `gh pr comment`, formatted per the agent file's output format.
            Only post GitHub comments — do not submit review text as messages.

            Begin the comment with EXACTLY this metadata block (verbatim,
            including the `>` quote markers and the trailing `---`), then
            an empty line, then the findings:

            > 🤖 **Automated review by Claude** · [view run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) · [checklist](${{ github.server_url }}/${{ github.repository }}/blob/main/.claude/agents/code-reviewer.md) · model: `${{ env.CLAUDE_MODEL }}`
            >
            > Apply or remove the `claude-review` label to control auto-reviews on this PR.

            ---

            Do not invoke the built-in `/review` slash command or skill. Use
            only the instructions from .claude/agents/code-reviewer.md.
          claude_args: >-
            --model ${{ env.CLAUDE_MODEL }}
            --max-turns 15
            --allowedTools "Read,Glob,Grep,Bash(git:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
