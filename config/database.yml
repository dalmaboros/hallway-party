# PostgreSQL. Versions 9.5 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   gem install pg -- --with-pg-config=/opt/homebrew/bin/pg_config
# On Windows:
#   gem install pg
#       Choose the win32 build.
#       Install PostgreSQL and put its /bin directory on your path.
#
# Configure Using Gemfile
# gem "pg"
#
# Primary app data lives in PostgreSQL (with pgvector via the neighbor gem).
# The Solid stack (cache/queue/cable) lives in SQLite files on disk —
# Rails 8's recommended pattern for small-to-medium apps. SQLite files persist
# across deploys via the Docker volume mounted at /rails/storage.
postgres_default: &postgres_default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>
  # The "build" defaults exist so `assets:precompile` during Docker build
  # can load this file without runtime env vars set. Kamal injects real
  # values at runtime; these defaults are never used in production.
  username: <%= ENV.fetch("DB_USERNAME", "build") %>
  password: <%= ENV.fetch("DB_PASSWORD", "build") %>

sqlite_default: &sqlite_default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

# Schema-load note: the Solid stack secondaries below are populated by
# `bin/load-solid-schemas` (called from bin/docker-entrypoint), not by Rails'
# native db:prepare. The reason: our global schema_format is :sql (so primary
# uses structure.sql), but the Solid* gems only ship .rb schemas. Rails 8
# uses the GLOBAL format to decide how to LOAD schema files, so it tries to
# parse cache_schema.rb as SQL and fails. The bin/load-solid-schemas script
# loads the .rb files directly via Ruby `load`, bypassing the format check.
# This is idempotent — only fires when the key table doesn't exist yet.
#
# We use database_tasks: false on the secondaries so db:prepare ignores them
# entirely and doesn't try to schema:load them in the wrong format.

development:
  primary:
    <<: *postgres_default
    database: hallway_party_development
  cache:
    <<: *sqlite_default
    database: storage/development_cache.sqlite3
    database_tasks: false
  queue:
    <<: *sqlite_default
    database: storage/development_queue.sqlite3
    database_tasks: false
  cable:
    <<: *sqlite_default
    database: storage/development_cable.sqlite3
    database_tasks: false

# Warning: the test database will be erased when you run `rake`.
test:
  primary:
    <<: *postgres_default
    database: hallway_party_test
  cache:
    <<: *sqlite_default
    database: storage/test_cache.sqlite3
    database_tasks: false
  queue:
    <<: *sqlite_default
    database: storage/test_queue.sqlite3
    database_tasks: false
  cable:
    <<: *sqlite_default
    database: storage/test_cable.sqlite3
    database_tasks: false

production:
  primary:
    <<: *postgres_default
    database: postgres
    sslmode: require
  cache:
    <<: *sqlite_default
    database: /rails/storage/production_cache.sqlite3
    database_tasks: false
  queue:
    <<: *sqlite_default
    database: /rails/storage/production_queue.sqlite3
    database_tasks: false
  cable:
    <<: *sqlite_default
    database: /rails/storage/production_cable.sqlite3
    database_tasks: false
